services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: tunevault-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_strong_Password123"
    ports:
      - "1433:1433"
    volumes:
      - tunevault-sql-data:/var/opt/mssql

volumes:
  tunevault-sql-data:
